  <style>
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
      background: #FAF6EC;
    }
    .safe-bottom { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
    .safe-top { padding-top: max(0.5rem, env(safe-area-inset-top)); }
    .no-bounce { overscroll-behavior: none; }
    button:disabled { cursor: not-allowed; }

    /* ---- Tela de carregamento (funciona antes do React/Babel montarem) ---- */
    #app-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0F2156;
      z-index: 9999;
      gap: 24px;
      transition: opacity 0.3s ease;
    }
    #app-splash.hidden { opacity: 0; pointer-events: none; }

    /* Logo SVG inline na splash */
    #app-splash svg { width: 160px; height: auto; }

    /* Spinner */
    .splash-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #FBBF24;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .splash-label {
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.1em;
    }

    #app-error {
      display: none;
      position: fixed; inset: 0;
      background: #0F2156;
      color: white;
      font-family: system-ui, sans-serif;
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: 16px; padding: 32px; text-align: center;
      z-index: 9999;
    }
    #app-error.visible { display: flex; }
    #app-error h2 { font-size: 18px; margin: 0; }
    #app-error p  { font-size: 13px; opacity: 0.7; margin: 0; line-height: 1.6; }
    #app-error button {
      margin-top: 8px; padding: 10px 24px;
      background: #FBBF24; color: #0F2156;
      border: none; border-radius: 12px;
      font-weight: 700; font-size: 14px; cursor: pointer;
    }
    /* ---- fim da splash ---- */

    /* Plano de fundo de "constelação" sutil no login — referência ao CERES Orion */
    .bg-constellation {
      background-color: #0F2156;
      background-image:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.10) 0 1.5px, transparent 2px),
        radial-gradient(circle at 78% 14%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 38%, rgba(255,255,255,0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 52%, rgba(255,255,255,0.10) 0 1.5px, transparent 2px),
        radial-gradient(circle at 28% 72%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 84%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 8% 90%, rgba(255,255,255,0.08) 0 1px, transparent 2px);
    }

    /* Marca d'água da Procer no canto */
    .procer-mark {
      letter-spacing: 0.25em;
    }
  </style>

        .map((b) => b.toString(16).padStart(2, "0"))
        .join("");
    }

    // Data no formato YYYY-MM-DD (TZ local)
    const todayISO = (d = new Date()) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };

    const formatDateLong = (iso) => {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).toLocaleDateString("pt-BR", {
        weekday: "short", day: "2-digit", month: "short",
      });
    };

    // YYYY-MM corrente
    const currentYearMonth = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    };

    // Tailwind precisa das classes em forma literal — pré-mapeamento por tipo
    const TYPE_CLASSES = {
      [REGISTRO_TYPE.TRABALHADO]: { bg: "bg-procer-600",  text: "text-white",       chip: "bg-procer-100 text-procer-700",  dot: "bg-procer-600" },
      [REGISTRO_TYPE.MANUTENCAO]: { bg: "bg-procer-400",  text: "text-white",       chip: "bg-procer-50 text-procer-600",   dot: "bg-procer-400" },
      [REGISTRO_TYPE.FOLGA]:      { bg: "bg-slate-500",   text: "text-white",       chip: "bg-slate-100 text-slate-700",    dot: "bg-slate-500" },
      [REGISTRO_TYPE.ATESTADO]:   { bg: "bg-rose-500",    text: "text-white",       chip: "bg-rose-100 text-rose-700",      dot: "bg-rose-500" },
      [REGISTRO_TYPE.FERIAS]:     { bg: "bg-wheat-500",   text: "text-procer-900",  chip: "bg-wheat-100 text-wheat-600",    dot: "bg-wheat-500" },
      [REGISTRO_TYPE.HOSPEDADO]:  { bg: "bg-indigo-500",  text: "text-white",       chip: "bg-indigo-100 text-indigo-700",  dot: "bg-indigo-500" },
    };

    // ---- Regra de folga ----
    // 1 folga a cada 10 dias CORRIDOS (consecutivos) em roteiro fora da cidade de moradia.
    // Dias "em casa" (folga, férias, ou trabalho/manutenção/atestado na própria cidade)
    // e gaps de registro quebram a sequência.
    // Atestado durante roteiro: marca-se com o flag awayFromHome e conta como dia válido.
    // A contagem é por roteiro, não cumulativa entre roteiros.
    const FOLGA_THRESHOLD = 10;

    // ---- Tolerância de registro retroativo ----
    // Colaborador pode registrar até MAX_DAYS_BACK dias atrás. Além disso o dia
    // fica permanentemente sem registro (e quebra a sequência de roteiro).
    const MAX_DAYS_BACK = 3;

    const isAwayDay = (reg) => {
      if (!reg) return false;
      if (reg.type === REGISTRO_TYPE.HOSPEDADO) return true;
      // Trabalhado, manutenção e atestado podem estar "em roteiro" — flag explícita
      if (
        reg.type === REGISTRO_TYPE.TRABALHADO ||
        reg.type === REGISTRO_TYPE.MANUTENCAO ||
        reg.type === REGISTRO_TYPE.ATESTADO
      ) {
        return reg.awayFromHome === true;
      }
      return false;
    };

    const isWeekend = (iso) => {
      const dow = new Date(iso + "T00:00:00").getDay();
      return dow === 0 || dow === 6; // Dom=0, Sáb=6
    };

    // Retorna datas estritamente ENTRE iso1 e iso2 (exclusivo de ambos)
    const getDatesBetween = (iso1, iso2) => {
      const dates = [];
      const curr = new Date(iso1 + "T00:00:00");
      curr.setDate(curr.getDate() + 1);
      const end = new Date(iso2 + "T00:00:00");
      while (curr < end) {
        dates.push(todayISO(new Date(curr)));
        curr.setDate(curr.getDate() + 1);
      }
      return dates;
    };

    // 1 folga a cada FOLGA_THRESHOLD dias corridos em roteiro.
    // Sábados e domingos SEM registro entre dois dias away são preenchidos automaticamente.
    // Um Sáb/Dom REGISTRADO como folga/férias/atestado-em-casa quebra a sequência.
    function calcFolgaStats(userRegistros) {
      const sorted = [...userRegistros].sort((a, b) => a.date.localeCompare(b.date));

      let folgasEarned = 0;
      let currentStreak = 0;
      let totalAwayDays = 0;
      let autoWeekendDays = 0;
      let lastAwayDate = null;

      const closeStreak = () => {
        folgasEarned += Math.floor(currentStreak / FOLGA_THRESHOLD);
        currentStreak = 0;
        lastAwayDate = null;
      };

      for (const reg of sorted) {
        if (isAwayDay(reg)) {
          if (lastAwayDate !== null) {
            const diff = daysBetween(lastAwayDate, reg.date);
            if (diff === 1) {
              // Dias consecutivos — continua
              currentStreak++;
              totalAwayDays++;
            } else {
              const gapDays = getDatesBetween(lastAwayDate, reg.date);
              const allWeekend = gapDays.length > 0 && gapDays.every(isWeekend);
              if (allWeekend) {
                // Fim de semana em roteiro: preenche automaticamente
                currentStreak += gapDays.length + 1;
                totalAwayDays += gapDays.length + 1;
                autoWeekendDays += gapDays.length;
              } else {
                // Gap com dia útil sem registro — quebra
                closeStreak();
                currentStreak = 1;
                totalAwayDays++;
              }
            }
          } else {
            currentStreak++;
            totalAwayDays++;
          }
          lastAwayDate = reg.date;
        } else {
          // Dia em casa (registrado) — quebra sequência
          closeStreak();
        }
      }
      folgasEarned += Math.floor(currentStreak / FOLGA_THRESHOLD);

      const folgasTaken = userRegistros.filter((r) => r.type === REGISTRO_TYPE.FOLGA).length;
      const saldo = folgasEarned - folgasTaken;
      const blockProgress = currentStreak % FOLGA_THRESHOLD;
      const daysToNext = blockProgress === 0 ? FOLGA_THRESHOLD : FOLGA_THRESHOLD - blockProgress;

      // Total de dias trabalhados: trabalhado + manutenção + hospedado + fins de semana auto
      const totalWorkedDays =
        userRegistros.filter((r) =>
          r.type === REGISTRO_TYPE.TRABALHADO ||
          r.type === REGISTRO_TYPE.MANUTENCAO ||
          r.type === REGISTRO_TYPE.HOSPEDADO
        ).length + autoWeekendDays;

      return {
        totalAwayDays, totalWorkedDays, autoWeekendDays,
        folgasEarned, folgasTaken, saldo,
        currentStreak, blockProgress, daysToNext,
        onRoteiro: currentStreak > 0,
      };
    }

    // -------------------------------------------------------------------
    // Migração de storage legado + usePersistedState robusto
    // -------------------------------------------------------------------

    // Aplica defaults por campo em um array de usuários (tolerante a schemas antigos)
    const applyUserDefaults = (arr) =>
      (Array.isArray(arr) ? arr : []).map((u) => ({
        status: STATUS.OFFLINE,
        homeCity: "",
        role: ROLE.COLABORADOR,
        ...u,
      }));

    // Migração one-shot: ao inicializar, lê dados de chaves legadas caso a
    // chave estável esteja vazia. Executa ANTES do React montar.
    (() => {
      for (const sub of ["users", "registros", "session"]) {
        const newKey = `${STORAGE_ROOT}:${sub}`;
        if (window.localStorage.getItem(newKey)) continue;
        for (const legacy of LEGACY_STORAGE_KEYS) {
          const old = window.localStorage.getItem(`${legacy}:${sub}`);
          if (old) { window.localStorage.setItem(newKey, old); break; }
        }
      }
    })();

    function usePersistedState(key, initialValue) {
      const [state, setState] = useState(() => {
        try {
          const raw = window.localStorage.getItem(key);
          if (!raw) return initialValue;
          const parsed = JSON.parse(raw);
          // Aplica defaults em arrays de usuários para tolerar campos ausentes
          if (key.endsWith(":users") && Array.isArray(parsed)) {
            const fixed = applyUserDefaults(parsed);
            return fixed.length ? fixed : initialValue;
          }
          return parsed;
        } catch { return initialValue; }
      });
      useEffect(() => {
        try { window.localStorage.setItem(key, JSON.stringify(state)); } catch {}
      }, [key, state]);
      return [state, setState];
    }


    function useClock() {
      const [clock, setClock] = useState(formatClock);
      useEffect(() => {
        const id = setInterval(() => setClock(formatClock()), 1000);
        return () => clearInterval(id);
      }, []);
      return clock;
    }

    function useGeolocation() {
      const [geo, setGeo] = useState({ enabled: false, loading: false, coords: null, error: null });
      const request = useCallback(() => {
        if (!navigator.geolocation) {
          setGeo({ enabled: false, loading: false, coords: null, error: "Geolocalização indisponível" });
          return;
        }
        setGeo((prev) => ({ ...prev, loading: true, error: null }));
        navigator.geolocation.getCurrentPosition(
          ({ coords }) => setGeo({ enabled: true, loading: false, coords: { lat: coords.latitude, lng: coords.longitude }, error: null }),
          (err) => setGeo({ enabled: false, loading: false, coords: null, error: err.message || "Falha ao obter localização" }),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }, []);
      const label = useMemo(() => {
        if (geo.loading) return "Obtendo localização...";
        if (geo.error) return geo.error;
        if (geo.enabled && geo.coords) return `Local validado: ${geo.coords.lat.toFixed(4)}, ${geo.coords.lng.toFixed(4)}`;
        return "Localização desativada";
      }, [geo]);
      return { ...geo, label, request };
    }

        if (!toast) return;
        const id = setTimeout(() => setToast(null), TOAST_TTL_MS);
        return () => clearTimeout(id);
      }, [toast]);
      const show = useCallback((text, type = TOAST.INFO) => setToast({ text, type, id: newId() }), []);

    // -------------------------------------------------------------------

    function LoginScreen({ users, onLogin, toast }) {

        const u = username.trim().toLowerCase();

          // Sempre faz o hash, mesmo se o usuário não existir, para evitar
          // vazamento de existência via timing attack.

            onLogin.error("Usuário ou senha inválidos.");
            return;
          }
          onLogin.success({
            id: user.id,
            username: user.username,
            role: user.role,
            displayName: user.displayName,
            title: user.title,
            homeCity: user.homeCity || "",

                  <label className="flex items-center justify-center gap-2 cursor-pointer rounded-2xl border border-procer-200 p-3 text-xs font-semibold text-procer-700">
                    <Icon name="refreshCw" className="h-3.5 w-3.5" />
                    Primeiro acesso neste dispositivo? Importar usuários
                    <input
                      type="file"
                      accept=".json"
                      className="sr-only"
                      onChange={(e) => {
                        const file = e.target.files?.[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                          try {
                            const data = JSON.parse(ev.target.result);
                            if (!Array.isArray(data)) throw new Error("Formato inválido");
                            const valid = applyUserDefaults(data).filter((u) => u.id && u.username && u.passwordHash);
                            if (!valid.length) { alert("Nenhum usuário válido no arquivo."); return; }
                            // Salva direto no localStorage para que o LoginScreen leia via prop
                            // O App vai recarregar a prop users ao detectar a mudança
                            const key = `${STORAGE_ROOT}:users`;
                            const existing = JSON.parse(window.localStorage.getItem(key) || "[]");
                            const existingIds = new Set(existing.map((u) => u.id));
                            const toAdd = valid.filter((u) => !existingIds.has(u.id));
                            const merged = [...existing, ...toAdd];
                            window.localStorage.setItem(key, JSON.stringify(merged));
                            alert(`${valid.length} usuário(s) importado(s). Recarregue a página e faça login.`);
                          } catch (err) { alert("Erro: " + err.message); }
                        };
                        reader.readAsText(file);
                        e.target.value = "";
                      }}
                    />
                  </label>
                </form>
              </div>

              <div className="border-t border-procer-100 bg-procer-50 px-5 py-4 text-center text-[11px] text-procer-700">
                <span className="font-semibold">PROCER AUTOMAÇÃO S.A.</span> · Criciúma/SC · v{APP_VERSION}
              </div>
            </div>

            {/* Rodapé com a constelação */}
            <p className="mt-6 text-center text-[10px] font-semibold uppercase tracking-[0.3em] text-white/40">
              Guardião do pós-colheita
            </p>
          </div>
        </div>
      );
    }

    // -------------------------------------------------------------------
    // Aba Registro — registrar status do dia
    // -------------------------------------------------------------------
    function RegistroTab({ session, geo, registros, onRegister }) {
      const [targetDate, setTargetDate] = useState(todayISO());
      const [selected, setSelected] = useState(null);
      const [observation, setObservation] = useState("");
      const [awayFromHome, setAwayFromHome] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      // Opções de data: hoje + MAX_DAYS_BACK dias retroativos
      const dateOptions = useMemo(() => {
        const today = new Date();
        const opts = [];
        for (let i = 0; i <= MAX_DAYS_BACK; i++) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          const iso = todayISO(d);
          const weekday = d.toLocaleDateString("pt-BR", { weekday: "short" }).replace(".", "");
          const dayMonth = d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" }).replace(".", "");
          opts.push({
            iso,
            weekday,
            dayMonth,
            label: i === 0 ? "Hoje" : i === 1 ? "Ontem" : dayMonth,
          });
        }
        return opts;
      }, []);

      // Registro existente para a data selecionada
      const currentReg = useMemo(
        () => registros.find((r) => r.userId === session.id && r.date === targetDate),
        [registros, session.id, targetDate]
      );

      // Estatística de folga para o usuário logado (estimulo no registro)
      const myStats = useMemo(
        () => calcFolgaStats(registros.filter((r) => r.userId === session.id)),
        [registros, session.id]
      );

      const handleSelectType = (type) => {
        if (selected === type) {
          setSelected(null);
        } else {
          setSelected(type);
          // Hospedado já é "fora" por definição; demais começam como false
          setAwayFromHome(type === REGISTRO_TYPE.HOSPEDADO);
        }
      };

      const handleSelectDate = (iso) => {
        setTargetDate(iso);
        setSelected(null);
        setObservation("");
        setAwayFromHome(false);
      };

      const submit = async () => {
        if (!selected || submitting) return;
        setSubmitting(true);
        try {
          await onRegister({ type: selected, observation: observation.trim(), awayFromHome, date: targetDate });
          setSelected(null);
          setObservation("");
          setAwayFromHome(false);
        } finally {
          setSubmitting(false);
        }
      };

      const isToday = targetDate === todayISO();
      const targetLabel = isToday ? "hoje" : (targetDate === dateOptions[1]?.iso ? "ontem" : formatDateLong(targetDate));

      return (
        <div className="space-y-4">
          {/* Cabeçalho com identidade */}
          <div className="overflow-hidden rounded-[1.75rem] bg-procer-800 p-5 text-white shadow-card relative">
            <p className="text-[10px] font-semibold uppercase tracking-widest text-wheat-300">Olá,</p>
            <h2 className="mt-1 text-2xl font-extrabold">{session.displayName.split(" ")[0]}</h2>
            <p className="mt-1 text-sm text-white/70">{session.title}</p>
            <p className="mt-3 text-[11px] uppercase tracking-widest text-wheat-300">
              {formatDateLong(targetDate)}
            </p>
          </div>

          {/* Seletor de data (Hoje + 3 dias retroativos) */}
          <div className="rounded-[1.75rem] bg-white p-4 shadow-card">
            <p className="mb-2 text-[10px] font-bold uppercase tracking-wider text-procer-600">
              Registrar para
            </p>
            <div className="grid grid-cols-4 gap-1.5">
              {dateOptions.map((opt) => {
                const isActive = targetDate === opt.iso;
                return (
                  <button
                    key={opt.iso}
                    type="button"
                    onClick={() => handleSelectDate(opt.iso)}
                    className={`rounded-xl p-2 text-center transition ${
                      isActive
                        ? "bg-procer-800 text-white shadow-cta"
                        : "bg-procer-50 text-procer-700 active:bg-procer-100"
                    }`}
                  >
                    <p className={`text-[9px] font-bold uppercase tracking-wider ${isActive ? "text-wheat-300" : "text-procer-500"}`}>
                      {opt.weekday}
                    </p>
                    <p className="text-sm font-extrabold leading-tight">{opt.label}</p>
                  </button>
                );
              })}
            </div>
            <p className="mt-2 text-[10px] text-ink/40">
              Tolerância de até {MAX_DAYS_BACK} dias retroativos. Depois disso o dia fica permanentemente sem registro.
            </p>
          </div>

          {/* Registro da data selecionada (se existir) */}
          {currentReg && (
            <div className="rounded-[1.75rem] bg-white p-5 shadow-card">
              <p className="text-[10px] font-semibold uppercase tracking-widest text-procer-600">
                Status registrado {targetLabel}
              </p>
              <div className="mt-2 flex items-center gap-3">
                <span className={`flex h-12 w-12 items-center justify-center rounded-2xl ${TYPE_CLASSES[currentReg.type].bg} ${TYPE_CLASSES[currentReg.type].text}`}>
                  <Icon name={REGISTRO_META[currentReg.type].icon} className="h-6 w-6" />
                </span>
                <div className="flex-1">
                  <p className="font-extrabold text-procer-900">
                    {REGISTRO_META[currentReg.type].label}
                    {currentReg.awayFromHome && (
                      <span className="ml-2 rounded-full bg-procer-100 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider text-procer-700">
                        Em roteiro
                      </span>
                    )}
                  </p>
                  {currentReg.observation && (
                    <p className="text-xs text-ink/60">{currentReg.observation}</p>
                  )}
                </div>
              </div>
              <p className="mt-3 text-[11px] text-ink/40">
                Selecione outro tipo abaixo para alterar o registro {targetLabel}.
              </p>
            </div>
          )}

          {/* Grade de tipos */}
          <div className="rounded-[1.75rem] bg-white p-5 shadow-card">
            <h3 className="font-bold text-procer-900">
              {currentReg ? `Alterar status — ${targetLabel}` : `Registrar status — ${targetLabel}`}
            </h3>
            <div className="mt-4 grid grid-cols-2 gap-3">
              {Object.values(REGISTRO_TYPE).map((type) => {
                const meta = REGISTRO_META[type];
                const cls = TYPE_CLASSES[type];
                const isSelected = selected === type;
                const isCurrent = currentReg?.type === type;
                return (
                  <button
                    key={type}
                    type="button"
                    onClick={() => handleSelectType(type)}
                    className={`flex flex-col items-start gap-2 rounded-2xl border-2 p-4 text-left transition ${
                      isSelected
                        ? `${cls.bg} ${cls.text} border-transparent shadow-cta`
                        : isCurrent
                          ? "border-procer-200 bg-procer-50 text-procer-900"
                          : "border-procer-100 bg-white text-procer-900 active:bg-procer-50"
                    }`}
                  >
                    <span className={`flex h-9 w-9 items-center justify-center rounded-xl ${
                      isSelected ? "bg-white/20" : cls.chip
                    }`}>
                      <Icon name={meta.icon} className="h-4 w-4" />
                    </span>
                    <span className="text-sm font-bold leading-tight">{meta.label}</span>
                    {isCurrent && !isSelected && (
                      <span className="text-[9px] font-bold uppercase tracking-wider text-procer-600">Atual</span>
                    )}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Confirmação */}
          {selected && (
            <div className="rounded-[1.75rem] bg-white p-5 shadow-card">
              <label htmlFor="reg-obs" className="block text-sm font-semibold text-procer-800">
                Observação <span className="font-normal text-ink/40">(opcional)</span>
              </label>
              <textarea
                id="reg-obs"
                value={observation}
                onChange={(e) => setObservation(e.target.value)}
                placeholder={
                  selected === REGISTRO_TYPE.MANUTENCAO ? "Ex.: Placa, problema, oficina..."
                  : selected === REGISTRO_TYPE.ATESTADO ? "Ex.: Médico, CID, dias..."
                  : selected === REGISTRO_TYPE.HOSPEDADO ? "Ex.: Cidade, cliente..."
                  : "Detalhes do dia"
                }
                rows={2}
                className="mt-1 w-full rounded-2xl border border-procer-200 bg-white p-3 text-sm text-ink outline-none focus:border-procer-600 focus:ring-2 focus:ring-procer-100"
              />

              {(selected === REGISTRO_TYPE.TRABALHADO || selected === REGISTRO_TYPE.MANUTENCAO || selected === REGISTRO_TYPE.ATESTADO) && (
                <label className="mt-3 flex items-start gap-3 rounded-2xl border border-procer-200 p-3 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={awayFromHome}
                    onChange={(e) => setAwayFromHome(e.target.checked)}
                    className="mt-0.5 h-5 w-5 rounded border-procer-300 accent-procer-600"
                  />
                  <div className="flex-1">
                    <p className="text-sm font-semibold text-procer-800">
                      {selected === REGISTRO_TYPE.ATESTADO ? "Atestado durante roteiro" : "Em roteiro (fora da cidade)"}
                    </p>
                    <p className="text-xs text-ink/50">
                      {session.homeCity
                        ? <>Cidade de moradia: <strong>{session.homeCity}</strong></>
                        : "Cidade de moradia não cadastrada — peça ao admin"}
                    </p>
                    <p className="mt-1 text-[11px] text-procer-600">
                      Conta para o saldo de folgas (1 a cada {FOLGA_THRESHOLD} dias corridos)
                    </p>
                  </div>
                </label>
              )}

              {selected === REGISTRO_TYPE.HOSPEDADO && (
                <div className="mt-3 flex items-start gap-2 rounded-2xl bg-indigo-50 p-3 text-xs text-indigo-700">
                  <Icon name="bed" className="mt-0.5 h-4 w-4 shrink-0" />
                  <p>
                    Hospedado conta automaticamente como dia <strong>em roteiro fora</strong> da cidade
                    {session.homeCity ? <> de moradia ({session.homeCity})</> : null}.
                  </p>
                </div>
              )}

              {(selected === REGISTRO_TYPE.TRABALHADO || selected === REGISTRO_TYPE.MANUTENCAO || selected === REGISTRO_TYPE.ATESTADO) && awayFromHome && myStats.onRoteiro && (
                <div className="mt-3 rounded-2xl bg-wheat-50 px-3 py-2 text-xs font-semibold text-wheat-600">
                  Você está há <span className="text-procer-900">{myStats.currentStreak}</span> dia{myStats.currentStreak === 1 ? "" : "s"} em roteiro — faltam <span className="text-procer-900">{myStats.daysToNext}</span> dia{myStats.daysToNext === 1 ? "" : "s"} para a próxima folga.
                </div>
              )}

              {(selected === REGISTRO_TYPE.TRABALHADO || selected === REGISTRO_TYPE.MANUTENCAO) && (
                <div className="mt-3 flex items-start gap-2 rounded-2xl bg-procer-50 p-3 text-xs text-procer-700">
                  <Icon name="mapPin" className="mt-0.5 h-4 w-4 shrink-0 text-procer-600" />
                  <div className="flex-1">
                    {isToday ? (
                      <>
                        <p>{geo.label}</p>
                        {!geo.enabled && (
                          <button type="button" onClick={geo.request}
                            className="mt-1 font-semibold underline">
                            Ativar localização
                          </button>
                        )}
                      </>
                    ) : (
                      <p>Localização não é capturada em registros retroativos.</p>
                    )}
                  </div>
                </div>
              )}

              <button
                type="button"
                onClick={submit}
                disabled={submitting}
                className={`mt-4 flex h-12 w-full items-center justify-center gap-2 rounded-2xl font-semibold shadow-cta disabled:opacity-60 ${TYPE_CLASSES[selected].bg} ${TYPE_CLASSES[selected].text}`}
              >
                <Icon name="edit" />
                {submitting
                  ? "Salvando..."
                  : `Confirmar como ${REGISTRO_META[selected].label}`}
              </button>
            </div>
          )}
        </div>
      );
    }

    // -------------------------------------------------------------------
    // Aba Equipe — Gestão de Usuários
    // -------------------------------------------------------------------
    function UserRow({ user, isSelf, expanded, onToggleExpand, onResetPassword, onToggleRole, onDelete }) {
      const isAdmin = user.role === ROLE.ADMIN;

        <div className="rounded-2xl border border-procer-100 bg-white">
          <button
            type="button"
            onClick={onToggleExpand}
            aria-expanded={expanded}
            className="flex w-full items-start justify-between gap-3 p-4 text-left"
          >
            <div className="min-w-0 flex-1">
              <div className="flex items-center gap-2">
                <p className="truncate font-bold text-procer-900">{user.displayName}</p>
                {isSelf && (
                  <span className="rounded-full bg-procer-50 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider text-procer-600">

                  </span>
                )}
              </div>
              <p className="truncate text-sm text-ink/60">{user.title}</p>

            <div className="flex flex-col items-end gap-1.5 shrink-0">
              <span className={`rounded-full px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ${
                isAdmin ? "bg-procer-800 text-wheat-300" : "bg-procer-100 text-procer-700"
              }`}>
                {isAdmin ? "Admin" : "Colab."}
              </span>
              <span className={`rounded-full px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ${
                user.status === STATUS.ONLINE ? "bg-procer-50 text-procer-600" : "bg-ink/5 text-ink/40"
              }`}>
                {user.status}

            <div className="border-t border-procer-100 px-4 py-3">
              <p className="text-xs text-ink/50">

              </p>
              <div className="mt-3 grid grid-cols-3 gap-2">
                <button

                >
                  <Icon name="keyRound" />

                <button
                  type="button"

                  <Icon name="shieldCheck" />
                  {isAdmin ? "Despromover" : "Promover"}

                <button
                  type="button"

                </p>
              )}
            </div>
          )}
        </div>
      );

    function EquipeTab({ users, currentUserId, userOps, isAdmin }) {
      const [search, setSearch] = useState("");
      const [expandedId, setExpandedId] = useState(null);
      const [showCreate, setShowCreate] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const emptyDraft = { username: "", password: "", displayName: "", title: "", homeCity: "" };
      const [draft, setDraft] = useState(emptyDraft);

      const visible = useMemo(() => {
        const q = search.toLowerCase().trim();
        if (!q) return users;
        return users.filter((u) =>
          [u.displayName, u.title, u.username, u.role, u.homeCity || ""].some((f) => f.toLowerCase().includes(q))
        );
      }, [users, search]);

      const submit = async (e) => {
        e.preventDefault();
        if (submitting) return;
        setSubmitting(true);
        try {
          const ok = await userOps.create(draft);
          if (ok) { setDraft(emptyDraft); setShowCreate(false); }
        } catch (err) {
          userOps.showError?.("Erro ao cadastrar: " + (err.message || "verifique os campos."));
        } finally {
          setSubmitting(false);
        }
      };

      // Exporta lista de usuários (sem senhas em texto; apenas hashes) como JSON
      const exportUsers = () => {
        const data = JSON.stringify(users, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `procer-usuarios-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Importa JSON de usuários (gerado pelo admin em outro dispositivo)
      const importUsers = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error("Formato inválido");
            userOps.mergeImport?.(imported);
          } catch (err) {
            alert("Erro ao importar: " + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = ""; // reset input
      };

      return (
        <div className="space-y-4">
          {/* Cabeçalho com contador e CTAs */}
          <div className="rounded-[1.75rem] bg-white p-5 shadow-card">
            <div className="flex items-center justify-between">
              <div>
                <h3 className="text-lg font-bold text-procer-900">Equipe</h3>
                <p className="text-xs text-ink/50">{users.length} usuários cadastrados</p>
              </div>
              {isAdmin && (
                <div className="flex items-center gap-1.5">
                  <label
                    title="Importar usuários de outro dispositivo"
                    className="cursor-pointer flex items-center justify-center h-9 w-9 rounded-2xl bg-procer-50 text-procer-700 transition hover:bg-procer-100"
                  >
                    <Icon name="refreshCw" />
                    <input type="file" accept=".json" className="sr-only" onChange={importUsers} />
                  </label>
                  <button
                    type="button"
                    onClick={exportUsers}
                    title="Exportar usuários para outro dispositivo"
                    className="flex items-center justify-center h-9 w-9 rounded-2xl bg-procer-50 text-procer-700 transition hover:bg-procer-100"
                  >
                    <Icon name="logOut" />
                  </button>
                  <button
                    type="button"
                    onClick={() => setShowCreate((v) => !v)}
                    className="flex items-center gap-1.5 rounded-2xl bg-procer-800 px-3 py-2 text-xs font-semibold text-white shadow-cta"
                  >
                    <Icon name="plus" />
                    {showCreate ? "Cancelar" : "Novo"}
                  </button>
                </div>
              )}
            </div>

            {isAdmin && (
              <div className="mt-3 flex items-start gap-2 rounded-2xl bg-procer-50 px-3 py-2 text-[11px] text-procer-700">
                <Icon name="refreshCw" className="mt-0.5 h-3.5 w-3.5 shrink-0" />
                <span>
                  Usuários são salvos localmente. Para sincronizar com outros dispositivos:
                  <strong> exporte (↗)</strong> no dispositivo do admin e <strong>importe (↺)</strong> nos demais.
                </span>
              </div>
            )}
            </div>

            {showCreate && isAdmin && (
              <form onSubmit={submit} className="mt-4 space-y-3 border-t border-procer-100 pt-4">
                <Field
                  id="new-username"
                  label="Usuário (login)"
                  value={draft.username}
                  onChange={(e) => setDraft((p) => ({ ...p, username: e.target.value }))}
                  placeholder="ex.: joao.silva"
                  autoComplete="off"
                />
                <Field
                  id="new-password"
                  label="Senha inicial"
                  type="password"
                  value={draft.password}
                  onChange={(e) => setDraft((p) => ({ ...p, password: e.target.value }))}
                  placeholder="Mínimo 6 caracteres"
                  autoComplete="new-password"
                />
                <Field
                  id="new-displayname"
                  label="Nome completo"
                  value={draft.displayName}
                  onChange={(e) => setDraft((p) => ({ ...p, displayName: e.target.value }))}
                  placeholder="João da Silva"
                />
                <Field
                  id="new-title"
                  label="Cargo"
                  value={draft.title}
                  onChange={(e) => setDraft((p) => ({ ...p, title: e.target.value }))}
                  placeholder="Ex.: Téc. de Termometria"
                />
                <Field
                  id="new-homecity"
                  label="Cidade de moradia"
                  value={draft.homeCity}
                  onChange={(e) => setDraft((p) => ({ ...p, homeCity: e.target.value }))}
                  placeholder="Ex.: Criciúma/SC"
                />
                <p className="rounded-2xl bg-procer-50 px-3 py-2 text-[11px] text-procer-700">
                  Novo cadastro entra como <strong>Colaborador Procer</strong>. Você pode promover a administrador depois, na lista abaixo.
                </p>
                <button
                  type="submit"
                  disabled={submitting}
                  className="flex h-12 w-full items-center justify-center gap-2 rounded-2xl bg-procer-800 font-semibold text-white shadow-cta disabled:opacity-60"
                >
                  <Icon name="plus" />
                  {submitting ? "Cadastrando..." : "Cadastrar colaborador"}
                </button>
              </form>
            )}
          </div>

          {/* Busca */}
          <div className="rounded-[1.75rem] bg-white p-5 shadow-card">
            <div className="relative">
              <span className="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-procer-400">
                <Icon name="search" />
              </span>
              <label htmlFor="emp-search" className="sr-only">Buscar usuário</label>
              <input
                id="emp-search"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Buscar por nome, cargo ou login"
                className="h-12 w-full rounded-2xl border border-procer-200 bg-white pl-9 pr-4 outline-none focus:border-procer-600 focus:ring-2 focus:ring-procer-100"
              />
            </div>

            <div className="mt-4 space-y-2">
              {visible.length === 0 && (
                <p className="text-sm text-ink/50">Nenhum usuário encontrado.</p>
              )}
              {visible.map((user) => (
                <UserRow
                  key={user.id}
                  user={user}
                  isSelf={user.id === currentUserId}
                  expanded={expandedId === user.id}
                  onToggleExpand={() => setExpandedId((cur) => (cur === user.id ? null : user.id))}
                  onResetPassword={() => userOps.resetPassword(user.id)}

                  onDelete={() => userOps.remove(user.id)}

                  <p className="mt-0.5 text-rose-600">

    // -------------------------------------------------------------------
    // App
    // -------------------------------------------------------------------
    function App() {
      const [session, setSession] = usePersistedState(`${STORAGE_ROOT}:session`, null);
      const [users, setUsers] = usePersistedState(`${STORAGE_ROOT}:users`, INITIAL_USERS);
      const [registros, setRegistros] = usePersistedState(`${STORAGE_ROOT}:registros`, []);
      const [activeTab, setActiveTab] = useState(TAB.DASHBOARD);
      const geo = useGeolocation();
      const { toast, show: showToast } = useToast();

      const isAdmin = session?.role === ROLE.ADMIN;

      // Se a sessão atual aponta para um usuário que foi excluído ou rebaixado,
      // sincroniza com o estado real.
      useEffect(() => {
        if (!session) return;
        const me = users.find((u) => u.id === session.id);
        if (!me) {
          setSession(null);
          return;
        }
        if (me.role !== session.role || me.displayName !== session.displayName || me.title !== session.title || me.homeCity !== session.homeCity) {
          setSession({
            id: me.id,
            username: me.username,
            role: me.role,
            displayName: me.displayName,
            title: me.title,
            homeCity: me.homeCity || "",
          });
        }
      }, [users, session, setSession]);

      useEffect(() => {
        if (!isAdmin && activeTab === TAB.EQUIPE) setActiveTab(TAB.DASHBOARD);
      }, [isAdmin, activeTab]);

      // Registra/atualiza status do dia para o usuário logado
      const registerStatus = useCallback(async ({ type, observation, awayFromHome, date }) => {
        if (!session) return;
        const targetDate = date || todayISO();
        // Valida janela de tolerância: até MAX_DAYS_BACK dias atrás, nunca no futuro
        const today = todayISO();
        const diff = daysBetween(targetDate, today);
        if (diff < 0) {
          showToast("Não é possível registrar para datas futuras.", TOAST.ERROR);
          return;
        }
        if (diff > MAX_DAYS_BACK) {
          showToast(`Tolerância máxima é de ${MAX_DAYS_BACK} dias retroativos.`, TOAST.ERROR);
          return;
        }

        const userId = session.id;
        const needsLocation = type === REGISTRO_TYPE.TRABALHADO || type === REGISTRO_TYPE.MANUTENCAO;
        // Localização só faz sentido se está registrando hoje (GPS atual)
        const location = needsLocation && diff === 0 && geo.coords
          ? `${geo.coords.lat.toFixed(4)}, ${geo.coords.lng.toFixed(4)}`
          : null;

        // Regra de roteiro: hospedado SEMPRE é "fora";
        // trabalhado, manutenção e atestado dependem do flag explícito do colaborador.
        const effectiveAway =
          type === REGISTRO_TYPE.HOSPEDADO ? true
          : (
              type === REGISTRO_TYPE.TRABALHADO ||
              type === REGISTRO_TYPE.MANUTENCAO ||
              type === REGISTRO_TYPE.ATESTADO
            ) ? !!awayFromHome
          : false;

        setRegistros((prev) => [
          { id: newId(), userId, date: targetDate, type, location, observation: observation || null, awayFromHome: effectiveAway, ts: Date.now() },
          ...prev.filter((r) => !(r.userId === userId && r.date === targetDate)),
        ]);
        const dateLabel = diff === 0 ? "hoje" : diff === 1 ? "ontem" : `há ${diff} dias`;
        showToast(`Registrado como ${REGISTRO_META[type].label} (${dateLabel}).`, TOAST.SUCCESS);
      }, [session, geo.coords, setRegistros, showToast]);

      // Operações de gestão de usuários
      const userOps = useMemo(() => ({
        create: async ({ username, password, displayName, title, homeCity, role }) => {
          const u = (username || "").trim().toLowerCase();
          const dn = (displayName || "").trim();
          const t = (title || "").trim();
          const hc = (homeCity || "").trim();
          if (!u || !password || !dn || !t || !hc) {
            showToast("Preencha todos os campos.", TOAST.ERROR);
            return false;
          }
          if (!/^[a-z0-9._-]+$/.test(u)) {
            showToast("Login deve conter apenas letras, números, ponto, hífen e underline.", TOAST.ERROR);
            return false;
          }
          if (password.length < 6) {
            showToast("Senha deve ter ao menos 6 caracteres.", TOAST.ERROR);
            return false;
          }
          if (users.some((x) => x.username === u)) {
            showToast("Já existe usuário com esse login.", TOAST.ERROR);
            return false;
          }
          const passwordHash = await sha256(password);
          setUsers((prev) => [
            {
              id: newId(),
              username: u,
              passwordHash,
              role: role === ROLE.ADMIN ? ROLE.ADMIN : ROLE.COLABORADOR,
              displayName: dn,
              title: t,
              homeCity: hc,
              status: STATUS.OFFLINE,
            },
            ...prev,
          ]);
          showToast("Colaborador Procer cadastrado.", TOAST.SUCCESS);
          return true;
        },
        resetPassword: async (userId) => {
          const target = users.find((x) => x.id === userId);
          if (!target) return;
          const newPwd = window.prompt(`Nova senha para ${target.displayName} (mínimo 6 caracteres):`);
          if (newPwd === null) return;
          if (newPwd.length < 6) {
            showToast("Senha deve ter ao menos 6 caracteres.", TOAST.ERROR);
            return;
          }
          const passwordHash = await sha256(newPwd);
          setUsers((prev) => prev.map((x) => (x.id === userId ? { ...x, passwordHash } : x)));
          showToast(`Senha de ${target.displayName} redefinida.`, TOAST.SUCCESS);
        },
        toggleRole: (userId) => {
          if (userId === session?.id) {
            showToast("Você não pode alterar o próprio papel.", TOAST.ERROR);
            return;
          }
          const target = users.find((x) => x.id === userId);
          if (!target) return;
          const isLastAdmin =
            target.role === ROLE.ADMIN &&
            users.filter((x) => x.role === ROLE.ADMIN).length === 1;
          if (isLastAdmin) {
            showToast("Não é possível rebaixar o último administrador.", TOAST.ERROR);
            return;
          }
          const newRole = target.role === ROLE.ADMIN ? ROLE.COLABORADOR : ROLE.ADMIN;
          if (!window.confirm(`Alterar ${target.displayName} para ${newRole === ROLE.ADMIN ? "Administrador" : "Colaborador"}?`)) return;
          setUsers((prev) => prev.map((x) => (x.id === userId ? { ...x, role: newRole } : x)));
          showToast("Papel atualizado.", TOAST.SUCCESS);
        },
        mergeImport: (imported) => {
          try {
            const valid = applyUserDefaults(imported).filter((u) => u.id && u.username && u.passwordHash);
            if (!valid.length) { showToast("Nenhum usuário válido encontrado no arquivo.", TOAST.ERROR); return; }
            setUsers((prev) => {
              const existingIds = new Set(prev.map((u) => u.id));
              const existingUsernames = new Set(prev.map((u) => u.username));
              const toAdd = valid.filter((u) => !existingIds.has(u.id) && !existingUsernames.has(u.username));
              const toUpdate = valid.filter((u) => existingIds.has(u.id));
              const merged = prev.map((u) => {
                const upd = toUpdate.find((x) => x.id === u.id);
                return upd ? { ...u, ...upd } : u;
              });
              return [...merged, ...toAdd];
            });
            showToast(`${valid.length} usuário(s) importado(s) com sucesso.`, TOAST.SUCCESS);
          } catch (err) {
            showToast("Erro ao importar usuários: " + err.message, TOAST.ERROR);
          }
        },
        showError: (msg) => showToast(msg, TOAST.ERROR),
        remove: (userId) => {
          if (userId === session?.id) {
            showToast("Você não pode excluir a si mesmo.", TOAST.ERROR);
            return;
          }
          const target = users.find((x) => x.id === userId);
          if (!target) return;
          const isLastAdmin =
            target.role === ROLE.ADMIN &&
            users.filter((x) => x.role === ROLE.ADMIN).length === 1;
          if (isLastAdmin) {
            showToast("Não é possível excluir o último administrador.", TOAST.ERROR);
            return;
          }
          if (!window.confirm(`Excluir ${target.displayName}? Os registros do colaborador serão mantidos.`)) return;
          setUsers((prev) => prev.filter((x) => x.id !== userId));
          showToast(`${target.displayName} excluído.`, TOAST.SUCCESS);
        },
      }), [users, setUsers, showToast, session]);

      const loginHandlers = useMemo(() => ({
        success: (payload) => {
          setSession(payload);
          showToast(`Bem-vindo, ${payload.displayName.split(" ")[0]}.`, TOAST.SUCCESS);
        },
        error: (msg) => showToast(msg, TOAST.ERROR),
      }), [setSession, showToast]);

      const logout = () => {
        setSession(null);
        setActiveTab(TAB.DASHBOARD);
      };

      const clearAll = () => {
        if (!window.confirm("Limpar todos os dados locais (registros e usuários cadastrados)?")) return;
        setRegistros([]);
        setUsers(INITIAL_USERS);
        showToast("Dados locais restaurados ao padrão.", TOAST.INFO);
      };

      if (!session) return <LoginScreen users={users} onLogin={loginHandlers} toast={toast} />;

      return (
        <div className="min-h-screen bg-cream text-ink">
          <div className="mx-auto flex min-h-screen max-w-md flex-col">
            {/* Header com marca Procer */}
            <header className="bg-procer-800 px-4 pb-5 pt-4 text-white safe-top">
              <div className="flex items-center justify-between">
                <ProcerLogo variant="light" size="md" />
                <button onClick={logout} type="button"
                  className="rounded-2xl border border-white/20 px-3 py-2 text-xs font-semibold text-white">
                  Sair
                </button>
              </div>
              <div className="mt-4">
                <p className="text-[10px] font-semibold uppercase tracking-[0.25em] text-wheat-300">
                  Controle de Equipe · v{APP_VERSION}
                </p>
                <h1 className="mt-1 text-xl font-extrabold">{APP_NAME}</h1>
              </div>
            </header>

            <main className="-mt-3 flex-1 rounded-t-[2rem] bg-cream px-4 pb-28 pt-5">
              <Toast toast={toast} />

              {activeTab === TAB.DASHBOARD && (
                <DashboardTab session={session} users={users} registros={registros} isAdmin={isAdmin} />
              )}
              {activeTab === TAB.REGISTRO && (
                <RegistroTab session={session} geo={geo} registros={registros} onRegister={registerStatus} />
              )}
              {activeTab === TAB.EQUIPE && (
                <EquipeTab users={users} currentUserId={session.id} userOps={userOps} isAdmin={isAdmin} />
              )}
              {activeTab === TAB.HISTORICO && (
                <HistoricoTab session={session} users={users} registros={registros} isAdmin={isAdmin} onClear={clearAll} />
              )}
            </main>

            <nav className="fixed bottom-0 left-0 right-0 border-t border-procer-100 bg-white/95 px-3 py-2 backdrop-blur safe-bottom">
              <div className="mx-auto flex max-w-md gap-1.5">
                <TabButton active={activeTab === TAB.DASHBOARD} iconName="barChart" label="Dashboard" onClick={() => setActiveTab(TAB.DASHBOARD)} />
                <TabButton active={activeTab === TAB.REGISTRO} iconName="edit" label="Registro" onClick={() => setActiveTab(TAB.REGISTRO)} />
                {isAdmin && <TabButton active={activeTab === TAB.EQUIPE} iconName="users" label="Equipe" onClick={() => setActiveTab(TAB.EQUIPE)} />}
                <TabButton active={activeTab === TAB.HISTORICO} iconName="history" label="Histórico" onClick={() => setActiveTab(TAB.HISTORICO)} />
              </div>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

    // Remove splash screen e cancela o timeout de erro
    // O React renderiza sincronicamente o primeiro frame antes deste código continuar
    requestAnimationFrame(() => {
      clearTimeout(window.__appErrorTimeout);
      const splash = document.getElementById("app-splash");
      if (splash) {
        splash.classList.add("hidden");
        setTimeout(() => splash.remove(), 350);
      }
    });
  </script>

  <script>
    (function () {
      var RDOM = [
        'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
        'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js'
      ];
      var BABEL = [
        'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js',
        'https://unpkg.com/@babel/standalone@7.23.10/babel.min.js'
      ];

      function showErr() {
        clearTimeout(window.__appErrorTimeout);
        var sp = document.getElementById('app-splash');
        var er = document.getElementById('app-error');
        if (sp) sp.classList.add('hidden');
        if (er) er.classList.add('visible');
      }

      function load(urls, i, onOk, onFail) {
        if (i >= urls.length) { onFail(); return; }
        var s = document.createElement('script');
        s.crossOrigin = 'anonymous';
        s.onload  = onOk;
        s.onerror = function () { load(urls, i + 1, onOk, onFail); };
        s.src = urls[i];
        document.body.appendChild(s);
      }

      // Babel processa type="text/babel" automaticamente ao carregar.
      // Ele lê o atributo data-presets="react" do script tag e compila o JSX.
      // Não é necessário — nem correto — chamar Babel.transform() manualmente.
      load(RDOM, 0,
        function () { load(BABEL, 0, function () { /* Babel auto-processa */ }, showErr); },
        showErr
      );
    })();
  </script>
